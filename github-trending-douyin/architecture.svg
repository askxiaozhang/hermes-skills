  <!-- Stage 5 -->
  <g>
    <rect x="1012" y="150" width="196" height="230" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <circle cx="1044" cy="190" r="20" fill="#CF222E"/>
