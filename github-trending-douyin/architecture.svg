<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans CJK SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#10151D"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#58A6FF"/>
    </marker>
    <marker id="arrowLoop" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#D29922"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="600" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1239" height="599" rx="20" fill="none" stroke="#21262D" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="58" fill="#E6EDF3" font-size="30" font-weight="700">全自动短视频内容流水线</text>
  <text x="40" y="90" fill="#8B949E" font-size="16">Fully-automated short-video pipeline · 0 人工干预 · 基于 Hermes Agent 自研 skills</text>
  <text x="1200" y="58" text-anchor="end" fill="#3FB950" font-size="14" font-weight="600">● LIVE · 30 天 10 万+ 播放</text>

  <!-- ===== Stage cards ===== -->
  <!-- card geometry: width 196, height 230, y=150, step 248 -->

  <!-- Stage 1 -->
  <g>
    <rect x="20" y="150" width="196" height="230" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <circle cx="52" cy="190" r="20" fill="#1F6FEB"/>
    <text x="52" y="197" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700">1</text>
    <text x="86" y="186" fill="#58A6FF" font-size="13" font-weight="600">STAGE</text>
    <text x="86" y="202" fill="#8B949E" font-size="11">SCRAPE</text>
    <text x="38" y="246" fill="#E6EDF3" font-size="19" font-weight="700">热点抓取</text>
    <text x="38" y="272" fill="#8B949E" font-size="12">GitHub Trending</text>
    <text x="38" y="290" fill="#8B949E" font-size="12">Top 10 · 按增长排序</text>
    <rect x="38" y="320" width="120" height="26" rx="13" fill="#0D1117" stroke="#30363D"/>
    <text x="98" y="337" text-anchor="middle" fill="#79C0FF" font-size="11" font-family="monospace">requests · bs4</text>
  </g>

  <!-- Stage 2 -->
  <g>
    <rect x="268" y="150" width="196" height="230" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <circle cx="300" cy="190" r="20" fill="#8957E5"/>
    <text x="300" y="197" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700">2</text>
    <text x="334" y="186" fill="#D2A8FF" font-size="13" font-weight="600">STAGE</text>
    <text x="334" y="202" fill="#8B949E" font-size="11">SCRIPT</text>
    <text x="286" y="246" fill="#E6EDF3" font-size="19" font-weight="700">文案生成</text>
    <text x="286" y="272" fill="#8B949E" font-size="12">LLM 口播脚本</text>
    <text x="286" y="290" fill="#8B949E" font-size="12">Hook 模板库轮换</text>
    <rect x="286" y="320" width="120" height="26" rx="13" fill="#0D1117" stroke="#30363D"/>
    <text x="346" y="337" text-anchor="middle" fill="#D2A8FF" font-size="11" font-family="monospace">LLM API</text>
  </g>

  <!-- Stage 3 -->
  <g>
    <rect x="516" y="150" width="196" height="230" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <circle cx="548" cy="190" r="20" fill="#1A7F37"/>
    <text x="548" y="197" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700">3</text>
    <text x="582" y="186" fill="#3FB950" font-size="13" font-weight="600">STAGE</text>
    <text x="582" y="202" fill="#8B949E" font-size="11">VOICE</text>
    <text x="534" y="246" fill="#E6EDF3" font-size="19" font-weight="700">配音合成</text>
    <text x="534" y="272" fill="#8B949E" font-size="12">男声 · 语速 +18%</text>
    <text x="534" y="290" fill="#8B949E" font-size="12">分段 TTS · 取时长</text>
    <rect x="534" y="320" width="120" height="26" rx="13" fill="#0D1117" stroke="#30363D"/>
    <text x="594" y="337" text-anchor="middle" fill="#56D364" font-size="11" font-family="monospace">edge-tts</text>
  </g>

  <!-- Stage 4 -->
  <g>
    <rect x="764" y="150" width="196" height="230" rx="16" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <circle cx="796" cy="190" r="20" fill="#BC4C00"/>
    <text x="796" y="197" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="700">4</text>
    <text x="830" y="186" fill="#F0883E" font-size="13" font-weight="600">STAGE</text>
    <text x="830" y="202" fill="#8B949E" font-size="11">RENDER</text>
    <text x="782" y="246" fill="#E6EDF3" font-size="19" font-weight="700">视频合成</text>
