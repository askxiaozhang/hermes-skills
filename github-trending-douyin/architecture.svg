  <!-- arrows between stages (y center 265) -->
  <line x1="220" y1="265" x2="262" y2="265" stroke="#58A6FF" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="468" y1="265" x2="510" y2="265" stroke="#58A6FF" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="716" y1="265" x2="758" y2="265" stroke="#58A6FF" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="964" y1="265" x2="1006" y2="265" stroke="#58A6FF" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- feedback loop: publish -> knowledge base -> scrape -->
  <path d="M1110 380 C1110 470, 118 470, 118 386" fill="none" stroke="#D29922" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowLoop)"/>
  <rect x="528" y="452" width="184" height="34" rx="17" fill="#1C1917" stroke="#D29922" stroke-width="1.2"/>
  <text x="620" y="474" text-anchor="middle" fill="#E3B341" font-size="13" font-weight="600">项目知识库 · 回头客上下文</text>

  <!-- bottom metrics banner -->
  <rect x="20" y="520" width="1188" height="58" rx="14" fill="#0B2818" stroke="#1A7F37" stroke-width="1.2"/>
  <text x="60" y="556" fill="#3FB950" font-size="22" font-weight="700">10万+</text>
  <text x="60" y="572" fill="#8B949E" font-size="11">30 天播放量</text>
  <text x="300" y="556" fill="#3FB950" font-size="22" font-weight="700">+388</text>
  <text x="300" y="572" fill="#8B949E" font-size="11">净增粉丝</text>
  <text x="520" y="556" fill="#3FB950" font-size="22" font-weight="700">2,251</text>
  <text x="520" y="572" fill="#8B949E" font-size="11">作品点赞</text>
  <text x="760" y="556" fill="#3FB950" font-size="22" font-weight="700">≈ 0</text>
  <text x="760" y="572" fill="#8B949E" font-size="11">单条成片人工耗时</text>
  <text x="1000" y="556" fill="#3FB950" font-size="22" font-weight="700">100%</text>
  <text x="1000" y="572" fill="#8B949E" font-size="11">自动化产出</text>
</svg>
