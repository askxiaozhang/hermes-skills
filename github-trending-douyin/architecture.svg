    <rect x="782" y="320" width="150" height="26" rx="13" fill="#0D1117" stroke="#30363D"/>
    <text x="857" y="337" text-anchor="middle" fill="#FFA657" font-size="11" font-family="monospace">Pillow · ffmpeg</text>
