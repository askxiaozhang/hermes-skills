name: Release Skill

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SKILL_NAME="${TAG%-v*}"
          VERSION="${TAG##*-v}"
          echo "skill=$SKILL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate manifest version matches tag
        run: |
          MANIFEST_VER=$(node -e "console.log(require('./skills/${{ steps.tag.outputs.skill }}/manifest.json').version)")
          if [ "$MANIFEST_VER" != "${{ steps.tag.outputs.version }}" ]; then
            echo "ERROR: manifest.json version ($MANIFEST_VER) does not match tag version (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Pack skill
        run: npm run pack -- ${{ steps.tag.outputs.skill }}

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep "^${{ steps.tag.outputs.skill }}-v" | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "notes=Initial release of ${{ steps.tag.outputs.skill }}" >> "$GITHUB_OUTPUT"
          else
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD -- "skills/${{ steps.tag.outputs.skill }}/")
            echo "notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ steps.tag.outputs.skill }} v${{ steps.tag.outputs.version }}"
          body: |
            ## ${{ steps.tag.outputs.skill }} v${{ steps.tag.outputs.version }}

            ${{ steps.notes.outputs.notes }}

            ### Installation

            ```bash
            npx skills add hermes-agent/hermes-skills -s ${{ steps.tag.outputs.skill }}
            ```
          files: |
            dist/release/${{ steps.tag.outputs.skill }}-${{ steps.tag.outputs.version }}.zip
            dist/release/${{ steps.tag.outputs.skill }}-${{ steps.tag.outputs.version }}.zip.sha256

      - name: Sync README download links
        run: |
          npm run readme:sync
          if git diff --quiet README.md; then
            echo "No README changes needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs(readme): sync download links for ${{ steps.tag.outputs.skill }} v${{ steps.tag.outputs.version }}"
            git push
          fi
