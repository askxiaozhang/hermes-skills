name: Validate Skills

on:
  push:
    paths:
      - 'skills/**'
      - 'scripts/release/**'
      - '*.md'
      - 'package.json'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/release/**'
      - '*.md'
      - 'package.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run validate
